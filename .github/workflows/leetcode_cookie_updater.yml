name: Update LeetCode Cookies

on:
  schedule:
    # Automatically triggers every 10 days to stay ahead of the 14-day expiry
    - cron: '0 0 */10 * *'
  workflow_dispatch: # Allows you to run this manually whenever you want

jobs:
  update_cookies:
    runs-on: ubuntu-latest
    steps:
      - name: Automatically Update Leetcode Session Cookie
        uses: vishrutkmr7/UpdateLCCookies@v1.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          leetcode-email: ${{ secrets.LEETCODE_USERNAME }}
          leetcode-password: ${{ secrets.LEETCODE_PASSWORD }}
