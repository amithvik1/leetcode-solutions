name: Update LeetCode Cookies

on:
  schedule:
    # Triggers every 10 days to stay ahead of the 14-day expiry
    - cron: '0 0 */10 * *'
  workflow_dispatch: # Allows you to run this manually whenever you want

jobs:
  update_cookies:
    runs-on: ubuntu-latest
    steps:
      - name: Automatically Update Leetcode Session Cookie
        # Target the official stable v1 tag
        uses: joshcai/leetcode-sync-cookies-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          username: ${{ secrets.LEETCODE_USERNAME }}
          password: ${{ secrets.LEETCODE_PASSWORD }}
